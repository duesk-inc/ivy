name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '!**/*.md'

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ivy_test
          POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ivy_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          cd backend
          go mod download

      - name: Run go vet
        run: |
          cd backend
          go vet ./...

      - name: Run go fmt check
        run: |
          cd backend
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Please run 'go fmt ./...'"
            exit 1
          fi

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: |
          cd backend
          go build -v ./...

      - name: Run tests
        env:
          CGO_ENABLED: "1"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ivy_test
          DB_DRIVER: postgres
          DB_SSLMODE: disable
          ENV: test
        run: |
          cd backend
          go test -v -race -timeout 15m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.out

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit --skipLibCheck

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Check build output
        run: |
          cd frontend
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: docker/backend/Dockerfile.prod
          push: false
          tags: ivy-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: docker/frontend/Dockerfile.prod
          push: false
          tags: ivy-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
